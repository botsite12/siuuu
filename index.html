<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link data-default-icon="https://static.xx.fbcdn.net/rsrc.php/y1/r/ay1hV6OlegS.ico" data-badged-icon="https://static.xx.fbcdn.net/rsrc.php/yD/r/UJj0tgk-RrT.ico" rel="shortcut icon" href="https://static.xx.fbcdn.net/rsrc.php/y1/r/ay1hV6OlegS.ico">
    <title>web của Cường</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
            touch-action: none; 
        }

        .container {
            width: 100%;
            max-width: 400px;
            z-index: 99; /* Luôn hiện trên sticker */
            position: relative;
        }

        .btn-gift {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            padding: 25px 50px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
            transition: transform 0.2s;
        }

        .btn-gift:active {
            transform: scale(0.9);
        }

        #troll-ui {
            display: none;
        }

        .troll-message {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Sticker Style */
        .sticker {
            position: absolute;
            z-index: 1;
            display: none; /* Ẩn lúc đầu */
            pointer-events: none; /* Không cho chạm vào sticker để cản trở nút bấm */
        }

        /* Vị trí các sticker */
        .s1 { top: 5%; left: 5%; width: 120px; }
        .s2 { top: 5%; right: 5%; width: 100px; }
        .s3 { bottom: 5%; left: 5%; width: 110px; }
        .s4 { bottom: 5%; right: 5%; width: 130px; }
        .s5 { top: 40%; left: 2%; width: 80px; }
        .s6 { top: 40%; right: 2%; width: 90px; }

        /* Hiệu ứng nhấp nháy cực mạnh */
        .seizure {
            animation: flash 0.1s infinite;
        }

        @keyframes flash {
            0% { background-color: #ff0000; }
            25% { background-color: #00ff00; }
            50% { background-color: #0000ff; }
            75% { background-color: #ffff00; }
            100% { background-color: #ff00ff; }
        }
    </style>
</head>
<body>

    <img src="https://tse1.mm.bing.net/th/id/OIP.8JGPdGWdav4YUL5BNRMtHQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" class="sticker s1">
    <img src="https://tse1.mm.bing.net/th/id/OIP.8JGPdGWdav4YUL5BNRMtHQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" class="sticker s2">
    <img src="https://tse1.mm.bing.net/th/id/OIP.8JGPdGWdav4YUL5BNRMtHQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" class="sticker s3">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnQ1MXg1Mmp1emN3YjYyejBwMG16emF0Z2p4eGgxbWl1ZXdqdnhqMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/1uPiL9Amv5zkk/giphy.gif" class="sticker s4">
    <img src="https://media.tenor.com/images/3f6b6126853d2de4cf789667b72b5070/tenor.gif" class="sticker s5">
    <img src="https://i.pinimg.com/originals/5d/88/34/5d8834e51d814285691e78bcccba2244.gif" class="sticker s6">

    <div class="container" id="init-ui">
        <button class="btn-gift" onclick="startTroll()">VÀO WEB ĐI 🎁</button>
        <p style="margin-top: 20px; color: #888;">Nhấn vào để vào web của Cường</p>
    </div>

    <div class="container" id="troll-ui">
        <h1 class="troll-message">HAHAHA!<br>BẠN ĐÃ BỊ LỪA!<br>😈😈😈</h1>
        <p>Chào mừng bạn đến với trang web vô tri này!</p>
        <p>Cường làm gì có web ha ha ha...</p>
    </div>

    <audio id="audio" loop>
        <source src="https://www.dropbox.com/scl/fi/vmz4uq9jfpmdtzt90gmb0/AI-A-EM-V-KVLTX-x-WUYS-REMIX-TIA-FT.-L-THI-N-HI-U-LOW-CORTISOL-FUNK.mp3?rlkey=zim3gsxa3vxtqnloc3obcprmz&st=hqe94zga&dl=1" type="audio/mpeg">
    </audio>

    <script>
        function startTroll() {
            // 1. Chuyển đổi giao diện
            document.getElementById('init-ui').style.display = 'none';
            document.getElementById('troll-ui').style.display = 'block';
            document.body.classList.add('seizure');

            // 2. Hiện các sticker
            const stickers = document.querySelectorAll('.sticker');
            stickers.forEach(s => s.style.display = 'block');

            // 3. Phát nhạc
            const audio = document.getElementById('audio');
            audio.play().catch(e => console.log("Lỗi phát nhạc"));

            // 4. Rung máy
            if ("vibrate" in navigator) {
                navigator.vibrate([200, 100, 200, 100, 500]);
            }

            // 5. Alert liên tục
            setTimeout(() => {
                alert("Ối giời ơi!");
                alert("Bạn tưởng là web á, ko ko đó là troll VN");
                alert("Hahaha, chúc mấy con bò sớm NGU thêm kkk");
                alert("MẤY THẰNG NGU HAHA");
                alert("MẤY CON BÒ");
                for(let i=1; i<=3; i++) {
                    alert("Thông báo thứ " + i + "...");
                }
            }, 500);
        }

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
            alert("Không thoát được đâu! Hahaha");
        };
    </script>
</body>
</html>
